<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
</head>
<body style="background-color: #212121; color: #ffffff;"> 

    
    <script>
        let div = document.createElement('div')
        // div.id = 'myId'
        // div.id = Math.random() * 10 + 1
        div.id = Math.round(Math.random() * 10 + 1)
        div.className = 'main'
        div.setAttribute('title', 'titleForChecking')
        div.style.background = 'green'
        div.style.padding = '10px'
        // div.innerText = 'This div generated by javascript'
        const text1 = document.createTextNode('This div generated by javascript')
        div.appendChild(text1)

        console.log(div);   
        document.body.appendChild(div)     
    </script>
</body>
</html>
